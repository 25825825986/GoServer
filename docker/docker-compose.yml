services:
  redis:
    image: redis:7-alpine
    container_name: goserver-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - goserver-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: goserver-app
    ports:
      - "8080:8080"  # TCP数据服务端口
      - "8081:8081"  # HTTP管理界面端口
    environment:
      - SERVER_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=production
      - BATCH_SIZE=100
      - WORKERS=10
      - QUEUE_SIZE=1000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - goserver-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  goserver-network:
    driver: bridge

volumes:
  redis-data:
