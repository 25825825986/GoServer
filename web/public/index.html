<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志实时处理系统 v2.0 - 管理控制台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #06b6d4;
            --bg-gradient-start: #1e3a5f;
            --bg-gradient-end: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px 30px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-light);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            font-size: 13px;
            color: var(--secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.blue { background: rgba(59, 130, 246, 0.2); color: var(--primary); }
        .stat-icon.green { background: rgba(16, 185, 129, 0.2); color: var(--secondary); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .stat-icon.red { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
        }

        /* Sidebar */
        .sidebar {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .filter-group { margin-bottom: 16px; }

        .filter-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .filter-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-primary);
            font-size: 14px;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-secondary {
            background: var(--border-color);
            color: var(--text-primary);
        }
        .btn-secondary:hover { background: #475569; }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }

        /* Level Stats */
        .level-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .level-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius);
            background: rgba(15, 23, 42, 0.5);
        }

        .level-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .level-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .level-count {
            font-weight: 600;
            font-size: 14px;
        }

        /* Main Content */
        .main-content {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .content-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 18px;
            font-weight: 600;
        }

        .content-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: var(--radius);
            background: var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover { background: #475569; }

        /* Log List */
        .log-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .log-item {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .log-item:hover { background: rgba(59, 130, 246, 0.05); }

        .log-item:last-child { border-bottom: none; }

        .log-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .log-level {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .level-debug { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
        .level-info { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .level-warn { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .level-error { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .level-fatal { background: rgba(220, 38, 38, 0.3); color: #fca5a5; }

        .log-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .log-source {
            font-size: 12px;
            color: var(--primary-light);
            margin-left: auto;
            padding: 2px 8px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 4px;
        }

        .log-message {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
            word-break: break-word;
        }

        .log-tags {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .log-tag {
            font-size: 11px;
            padding: 2px 8px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
            color: var(--text-secondary);
        }

        /* Empty State */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: slideIn 0.3s ease-out;
            border: 1px solid var(--border-color);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 968px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            header { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1><i class="fas fa-file-alt"></i> 日志实时处理系统 v2.0</h1>
                <p>MySQL存储 + Redis缓存 架构</p>
            </div>
            <div class="server-status">
                <div class="status-dot"></div>
                <span id="system-status">系统运行中</span>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-inbox"></i></div>
                <div>
                    <div class="stat-value" id="stat-received">0</div>
                    <div class="stat-label">今日接收</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                <div>
                    <div class="stat-value" id="stat-processed">0</div>
                    <div class="stat-label">处理成功</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-exclamation-triangle"></i></div>
                <div>
                    <div class="stat-value" id="stat-errors">0</div>
                    <div class="stat-label">处理失败</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-bolt"></i></div>
                <div>
                    <div class="stat-value" id="stat-connections">0</div>
                    <div class="stat-label">活跃连接</div>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">日志筛选</div>
                    <div class="filter-group">
                        <label class="filter-label">日志级别</label>
                        <select class="filter-input" id="filter-level">
                            <option value="">全部级别</option>
                            <option value="debug">Debug</option>
                            <option value="info">Info</option>
                            <option value="warn">Warning</option>
                            <option value="error">Error</option>
                            <option value="fatal">Fatal</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">来源</label>
                        <input type="text" class="filter-input" id="filter-source" placeholder="如: api-server">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">关键词</label>
                        <input type="text" class="filter-input" id="filter-keyword" placeholder="搜索内容...">
                    </div>
                    <button class="btn btn-primary" onclick="applyFilters()">
                        <i class="fas fa-search"></i> 筛选日志
                    </button>
                    <button class="btn btn-secondary" onclick="resetFilters()" style="margin-top: 8px;">
                        <i class="fas fa-undo"></i> 重置
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">今日统计</div>
                    <div class="level-stats" id="level-stats">
                        <div class="level-item">
                            <span class="level-name"><span class="level-dot" style="background: #94a3b8;"></span> Debug</span>
                            <span class="level-count" id="count-debug">0</span>
                        </div>
                        <div class="level-item">
                            <span class="level-name"><span class="level-dot" style="background: #60a5fa;"></span> Info</span>
                            <span class="level-count" id="count-info">0</span>
                        </div>
                        <div class="level-item">
                            <span class="level-name"><span class="level-dot" style="background: #fbbf24;"></span> Warning</span>
                            <span class="level-count" id="count-warn">0</span>
                        </div>
                        <div class="level-item">
                            <span class="level-name"><span class="level-dot" style="background: #f87171;"></span> Error</span>
                            <span class="level-count" id="count-error">0</span>
                        </div>
                        <div class="level-item">
                            <span class="level-name"><span class="level-dot" style="background: #fca5a5;"></span> Fatal</span>
                            <span class="level-count" id="count-fatal">0</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <button class="btn btn-danger" onclick="clearAllLogs()">
                        <i class="fas fa-trash"></i> 清空所有日志
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <div class="content-header">
                    <div class="content-title">
                        <i class="fas fa-list"></i> 实时日志流
                    </div>
                    <div class="content-actions">
                        <button class="icon-btn" onclick="toggleAutoRefresh()" title="自动刷新">
                            <i class="fas fa-sync-alt" id="refresh-icon"></i>
                        </button>
                        <button class="icon-btn" onclick="loadLogs()" title="刷新">
                            <i class="fas fa-redo"></i>
                        </button>
                    </div>
                </div>
                <div class="log-list" id="log-list">
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>暂无日志数据</p>
                        <p style="font-size: 13px; margin-top: 8px;">等待日志接收...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        const API_BASE = 'http://localhost:8081/api';
        let autoRefresh = true;
        let refreshInterval = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadLogs();
            startAutoRefresh();
        });

        // 自动刷新控制
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (autoRefresh) {
                    loadStats();
                    loadLogs();
                }
            }, 3000);
        }

        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            const icon = document.getElementById('refresh-icon');
            icon.style.opacity = autoRefresh ? '1' : '0.3';
            showToast(autoRefresh ? '自动刷新已开启' : '自动刷新已暂停', '', 'success');
        }

        // API请求
        async function fetchAPI(endpoint, options = {}) {
            try {
                const response = await fetch(API_BASE + endpoint, {
                    headers: { 'Content-Type': 'application/json' },
                    ...options
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                showToast('请求失败', error.message, 'error');
                return null;
            }
        }

        // 加载统计数据
        async function loadStats() {
            const [metrics, levelStats] = await Promise.all([
                fetchAPI('/metrics'),
                fetchAPI('/logs/stats')
            ]);

            if (metrics) {
                if (metrics.logs) {
                    document.getElementById('stat-received').textContent = metrics.logs.logs_received || 0;
                    document.getElementById('stat-processed').textContent = metrics.logs.logs_processed || 0;
                    document.getElementById('stat-errors').textContent = metrics.logs.logs_failed || 0;
                }
                if (metrics.system) {
                    document.getElementById('stat-connections').textContent = metrics.system.active_connections || 0;
                }
            }

            if (levelStats && levelStats.stats) {
                document.getElementById('count-debug').textContent = levelStats.stats.debug || 0;
                document.getElementById('count-info').textContent = levelStats.stats.info || 0;
                document.getElementById('count-warn').textContent = levelStats.stats.warn || 0;
                document.getElementById('count-error').textContent = levelStats.stats.error || 0;
                document.getElementById('count-fatal').textContent = levelStats.stats.fatal || 0;
            }
        }

        // 加载日志
        async function loadLogs() {
            const level = document.getElementById('filter-level').value;
            const source = document.getElementById('filter-source').value;
            const keyword = document.getElementById('filter-keyword').value;

            let url = '/logs/recent?limit=100';
            if (level) url += `&level=${level}`;
            if (source) url += `&source=${source}`;
            if (keyword) url += `&keywords=${keyword}`;

            const data = await fetchAPI(url);
            if (!data || !data.Data) return;

            renderLogs(data.Data);
        }

        // 渲染日志列表
        function renderLogs(logs) {
            const container = document.getElementById('log-list');

            if (!logs || logs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>暂无日志数据</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="log-item">
                    <div class="log-header">
                        <span class="log-level level-${log.level}">${log.level}</span>
                        <span class="log-time">${formatTime(log.timestamp)}</span>
                        ${log.source ? `<span class="log-source">${log.source}</span>` : ''}
                    </div>
                    <div class="log-message">${escapeHtml(log.message)}</div>
                    ${log.tags ? `<div class="log-tags">${log.tags.map(t => `<span class="log-tag">${t}</span>`).join('')}</div>` : ''}
                </div>
            `).join('');
        }

        // 应用筛选
        function applyFilters() {
            loadLogs();
            showToast('筛选已应用', '', 'success');
        }

        // 重置筛选
        function resetFilters() {
            document.getElementById('filter-level').value = '';
            document.getElementById('filter-source').value = '';
            document.getElementById('filter-keyword').value = '';
            loadLogs();
            showToast('筛选已重置', '', 'success');
        }

        // 清空日志
        async function clearAllLogs() {
            if (!confirm('确定要清空所有日志吗？此操作不可撤销！')) return;

            const data = await fetchAPI('/logs', { method: 'DELETE' });
            if (data) {
                showToast('日志已清空', '', 'success');
                loadStats();
                loadLogs();
            }
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                fractionalSecondDigits: 3
            });
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Toast提示
        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div style="color: ${type === 'success' ? '#10b981' : '#ef4444'};">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                </div>
                <div>
                    <div style="font-weight: 600; font-size: 14px;">${title}</div>
                    ${message ? `<div style="font-size: 13px; color: #94a3b8;">${message}</div>` : ''}
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
